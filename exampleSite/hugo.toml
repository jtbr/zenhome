baseURL = "https://example.com/"  # TODO: update to your domain
# relativeURLs lets the built site open directly via file:// without a server.
# This breaks if the site is ever served from a subdirectory (e.g. example.com/blog/).
# Safe for Cloudflare Pages deployments at an apex/subdomain root.
relativeURLs = true

# Theme — "zenhome" must match the directory name of the cloned theme repo.
# To develop the theme locally, run from this directory:
#   hugo server --themesDir ../..
theme    = "zenhome"
#themesDir = "../.."
languageCode = "en-us"
title = "TODO Site title"
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true

[permalinks]
  writings = "/writings/:slug/"
  things   = "/things/:slug/"
  notes    = "/notes/:slug/"

[params]
  # Optional: override the name shown in the nav bar and on the homepage h1.
  header_title = ""   # e.g. a short monogram (defaults to params.author.name)
  home_title   = "TODO: title"   # e.g. "Firstname M.I. Lastname" for a longer display name

  tagline     = "TODO: short tagline (e.g., Space Explorer)"
  description = "TODO: 1-2 sentence professional description for SEO and OG tags."
  cloudflare_analytics_token = ""  # paste token from Cloudflare Web Analytics dashboard

  # Optional copyright or other notice shown at the bottom-left of the footer.
  # When absent the social links are centered instead.
  copyright = ""  # e.g. "© 2026 Your Name"
  socials_prefix = ""  # e.g. "Find me via:"

  # og_image = "img/og-default.png"  # Optional fallback social-share card (path relative to static/, 1200×630 raster); shown on home + listing pages. Unset = image meta tags omitted.
  # favicon = "/icon.svg"  # Path relative to static/. Use SVG for modern browsers. (.png and .ico are also supported)
                           # Also place favicon.ico (32×32) in static for legacy browsers/RSS readers (auto-discovered, no config needed).
                           # Optional: apple-touch-icon.png (180×180) in static/ for iOS home screen shortcuts.

  [params.author]
    name         = "TODO Your Name"
    email        = "TODO you@example.com"
    bio          = "TODO: 2-3 sentence synopsis of what you do."
    background   = "TODO: 1-2 sentence background (degree, languages, experience)."
    availability = "Available for ML/AI freelance and consulting engagements."

  # Flip a section to true to show it in navigation and enable its listing page.
  [params.sections]
    writings      = true
    things        = true
    notes         = true
    # things_layout = "masonry" # Uncomment to use column-wise grid (items are then ordered top to bottom and then column by column)

  # giscus comments. Set enabled = true and fill in IDs from https://giscus.app
  [params.comments]
    enabled          = false
    repo             = "TODO/comments-repo"
    repoId           = "TODO"
    category         = "General"
    categoryId       = "TODO"
    mapping          = "pathname"
    reactions_enabled = "1"
    emit_metadata    = "0"
    input_position   = "bottom"
    theme            = "preferred_color_scheme"

  # Font families loaded from Google Fonts. Change the name AND update the
  # corresponding *_weights value to match what that font supports on Google Fonts.
  # See: https://fonts.google.com — use the "CSS2 API" weight spec shown there.
  [params.fonts]
    display          = "Cormorant Garamond"
    display_weights  = "ital,wght@0,300..700;1,300..700"
    display_fallback = "'Libre Baskerville', Georgia, 'Times New Roman', serif"
    body             = "Raleway"
    body_weights     = "ital,wght@0,300..700;1,300..700"
    body_fallback    = "'Open Sans', sans-serif"
    mono             = "Roboto Mono"
    mono_weights     = "wght@400;600"
    mono_fallback    = "'DejaVu Sans Mono', Menlo, Consolas, monospace"
    # Optional: a distinct font for image_text card graphics. Falls back to
    # the display font when unset. Add graphic_weights and graphic_fallback too.
    # graphic        = "Bebas Neue"
    # graphic_weights = "wght@400"
    # graphic_fallback = "Impact, sans-serif"

[markup]
  [markup.goldmark.renderer]
    unsafe = true

  # Pass-through keeps $...$, $$...$$, \(...\), \[...\] intact so the theme's
  # render hook can render them with Hugo's built-in KaTeX at build time.
  # REQUIRED for math: Hugo does not merge a theme's [markup] config, so every
  # site using this theme must include this block in its own hugo.toml.
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"], ["$", "$"]]

  [markup.highlight]
    noClasses = false   # use CSS classes; colors live in assets/scss/_code.scss
    lineNos   = false   # global default; override per-block via shortcode
    lineNumbersInTable = false  # if you do enable them, use inline mode so .ln style applies
    codeFences = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

[taxonomies]
  tag = "tags"
