baseURL = "https://example.com/"  # TODO: update to your domain
# relativeURLs lets the built site open directly via file:// without a server.
# This breaks if the site is ever served from a subdirectory (e.g. example.com/blog/).
# Safe for Cloudflare Pages deployments at an apex/subdomain root.
relativeURLs = true

# Theme — "homepage" must match the directory name of the cloned theme repo.
# To develop the theme locally, run from this directory:
#   hugo server --themesDir ../..
theme    = "homepage"
themesDir = "../.."
languageCode = "en-us"
title = "TODO Your Name"
enableRobotsTXT = true
enableGitInfo = false

[permalinks]
  writings = "/writings/:slug/"
  things   = "/things/:slug/"
  notes    = "/notes/:slug/"

[params]
  tagline     = "TODO: short tagline (e.g., ML/AI Consultant)"
  description = "TODO: 1-2 sentence professional description for SEO and OG tags."
  cloudflare_analytics_token = ""  # paste token from Cloudflare Web Analytics dashboard

  # Optional: override the name shown in the nav bar and on the homepage h1.
  # Both default to params.author.name when not set.
  header_title = ""   # e.g. a short monogram (defaults to params.author.name)
  home_title   = "TODO: title"   # e.g. "Firstname M.I. Lastname" for a longer display name

  # Optional copyright or other notice shown at the bottom-left of the footer.
  # When absent the social links are centered instead.
  copyright = ""  # e.g. "© 2026 Your Name"

  # Font families loaded from Google Fonts. Change the name AND update the
  # corresponding *_weights value to match what that font supports on Google Fonts.
  # See: https://fonts.google.com — use the "CSS2 API" weight spec shown there.
  [params.fonts]
    display          = "Cormorant Garamond"
    display_weights  = "ital,wght@0,500;0,700;1,500"
    display_fallback = "Georgia, 'Times New Roman', serif"
    body             = "Raleway"
    body_weights     = "wght@300;400;600;700"
    body_fallback    = "-apple-system, system-ui, sans-serif"
    mono             = "JetBrains Mono"
    mono_weights     = "wght@400;600"
    mono_fallback    = "'SF Mono', Menlo, Consolas, monospace"

  [params.author]
    name         = "TODO Your Name"
    email        = "TODO you@example.com"
    bio          = "TODO: 2-3 sentence synopsis of what you do."
    background   = "TODO: 1-2 sentence background (degree, languages, experience)."
    availability = "Available for ML/AI freelance and consulting engagements."

  # Flip a section to true to show it in navigation and enable its listing page.
  [params.sections]
    writings = true
    things   = true
    notes    = true

  # giscus comments. Set enabled = true and fill in IDs from https://giscus.app
  [params.comments]
    enabled          = false
    repo             = "TODO/comments-repo"
    repoId           = "TODO"
    category         = "General"
    categoryId       = "TODO"
    mapping          = "pathname"
    reactions_enabled = "1"
    emit_metadata    = "0"
    input_position   = "bottom"
    theme            = "preferred_color_scheme"

[markup]
  [markup.goldmark.renderer]
    unsafe = true

  # Pass-through keeps $...$, $$...$$, \(...\), \[...\] intact so KaTeX can render them.
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"], ["$", "$"]]

  [markup.highlight]
    noClasses = false   # use CSS classes; colors live in assets/scss/_code.scss
    lineNos   = false
    codeFences = true

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]

[taxonomies]
  tag = "tags"
