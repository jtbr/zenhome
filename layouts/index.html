{{ define "main" }}
<section class="landing">
  <h1 class="landing-name">{{ .Site.Params.home_title | default .Site.Params.author.name | default .Site.Title }}</h1>
  {{ with .Site.Params.tagline }}<p class="landing-tagline">{{ . }}</p>{{ end }}

  {{ with .Content }}
  <div class="landing-body">{{ . }}</div>
  {{ end }}
</section>
{{ end }}
