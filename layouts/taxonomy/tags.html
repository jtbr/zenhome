{{ define "main" }}
<header class="section-header">
  <h1>Tags</h1>
</header>

<ul class="notes-list list-unstyled">
  {{ range .Pages.ByTitle }}
  <li>
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}<i class="ri-arrow-right-long-line notes-title-arrow" aria-hidden="true"></i></a>
    <span class="tag-count">{{ len .Pages }}</span></h3>
  </li>
  {{ end }}
</ul>
{{ end }}
