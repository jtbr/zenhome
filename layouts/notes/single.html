{{ define "main" }}
<article class="note">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ if gt .ReadingTime 0 }}<span class="meta-sep">&#11049;</span><span>{{ .ReadingTime }} min read</span>{{ end }}
      {{ with .GetTerms "tags" }}<span class="meta-sep">&#11049;</span>{{ range . }}<a class="tag" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>{{ end }}{{ end }}
    </p>
  </header>

  {{ .Content }}
</article>
{{ end }}
