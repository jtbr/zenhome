{{ define "main" }}
<article class="note">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      <span><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time></span>
      {{ with .GetTerms "tags" }}{{ range . }}<a class="tag" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>{{ end }}{{ end }}
    </p>
  </header>

  {{ .Content }}
</article>
{{ end }}
