<header class="site-header">
  <nav class="container d-flex justify-content-between align-items-center py-3">
    <a class="brand" href="{{ .Site.Home.RelPermalink }}">{{ .Site.Params.header_title | default .Site.Params.author.name | default .Site.Title }}</a>
    <ul class="nav-links list-unstyled d-flex m-0 align-items-center">
      {{ if .Site.Params.sections.writings }}
        <li><a href="{{ with .Site.GetPage "/writings" }}{{ .RelPermalink }}{{ end }}">Writings</a></li>
      {{ end }}
      {{ if .Site.Params.sections.things }}
        <li><a href="{{ with .Site.GetPage "/things" }}{{ .RelPermalink }}{{ end }}">Useful Things</a></li>
      {{ end }}
      {{ if .Site.Params.sections.notes }}
        <li><a href="{{ with .Site.GetPage "/notes" }}{{ .RelPermalink }}{{ end }}">Notes</a></li>
      {{ end }}
      <li>
        <button id="theme-toggle" aria-label="Toggle dark mode">
          <i class="ri-moon-line" aria-hidden="true"></i>
        </button>
      </li>
    </ul>
  </nav>
</header>
