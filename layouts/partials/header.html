<header class="site-header">
  <nav class="container d-flex justify-content-between align-items-center py-3">
    <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Params.author.name | default .Site.Title }}</a>
    <ul class="nav-links list-unstyled d-flex m-0 align-items-center">
      {{ if .Site.Params.sections.writings }}
        <li><a href="{{ "/writings/" | relURL }}">Writings</a></li>
      {{ end }}
      {{ if .Site.Params.sections.things }}
        <li><a href="{{ "/things/" | relURL }}">Useful Things</a></li>
      {{ end }}
      {{ if .Site.Params.sections.notes }}
        <li><a href="{{ "/notes/" | relURL }}">Notes</a></li>
      {{ end }}
      <li>
        <button id="theme-toggle" aria-label="Toggle dark mode">
          <i class="fas fa-moon" aria-hidden="true"></i>
        </button>
      </li>
    </ul>
  </nav>
</header>
