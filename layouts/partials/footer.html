<footer class="site-footer">
  <div class="container py-4 d-flex justify-content-between flex-wrap align-items-center gap-3">
    <small>© {{ now.Format "2006" }} {{ .Site.Params.author.name }}</small>
    <ul class="socials list-unstyled d-flex m-0">
      {{ range .Site.Data.socials }}
      <li><a href="{{ .url }}" rel="me noopener" aria-label="{{ .name }}"><i class="fab fa-{{ .icon }}"></i></a></li>
      {{ end }}
    </ul>
  </div>
</footer>
