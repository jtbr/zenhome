<footer class="site-footer">
  <div class="container py-4 d-flex align-items-center gap-3 {{ if .Site.Params.copyright }}justify-content-between flex-wrap{{ else }}justify-content-center{{ end }}">
    {{ with .Site.Params.copyright }}<small>{{ . }}</small>{{ end }}
    <ul class="socials list-unstyled d-flex m-0">
      {{ range .Site.Data.socials }}
      <li><a href="{{ .url }}" rel="me noopener" aria-label="{{ .name }}"><span>{{ .name }}</span><i class="{{ .icon }}" aria-hidden="true"></i></a></li>
      {{ end }}
      {{ if .Site.Params.sections.writings }}
      <li><a href="{{ "/writings/index.xml" | relURL }}" rel="noopener" aria-label="Writings RSS feed"><span>RSS</span><i class="ri-rss-line" aria-hidden="true"></i></a></li>
      {{ end }}
    </ul>
  </div>
</footer>
