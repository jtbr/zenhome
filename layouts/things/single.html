{{ define "main" }}
<article class="thing">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.tagline }}<p class="lead">{{ . }}</p>{{ end }}
    {{ with .Params.link }}
      <p><a href="{{ . }}" class="btn btn-sm btn-outline-secondary" rel="noopener">View →</a></p>
    {{ end }}
  </header>

  <p class="post-meta">
    <button class="share-btn" aria-label="Share this page"><i class="ri-share-2-line" aria-hidden="true"></i></button>
  </p>

  {{ .Content }}
</article>
{{ end }}
