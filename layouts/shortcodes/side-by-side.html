{{- $parts := split .Inner "|||" -}}
<div class="side-by-side">
  <div>{{ if gt (len $parts) 1 }}{{ index $parts 0 | markdownify }}{{ else }}{{ .Get "left" | markdownify }}{{ end }}</div>
  <div>{{ if gt (len $parts) 1 }}{{ index $parts 1 | markdownify }}{{ else }}{{ .Get "right" | markdownify }}{{ end }}</div>
</div>
