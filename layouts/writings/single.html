{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
      · {{ .ReadingTime }} min read
    </p>
  </header>

  {{ .Content }}
</article>

{{ if and .Site.Params.comments.enabled .Params.comments }}
  {{ partial "giscus.html" . }}
{{ end }}
{{ end }}
