# Default social links — override by providing data/socials.yaml in your site.
# icon: full Remixicon class name, e.g. ri-github-line.
- name: GitHub
  icon: ri-github-line
  url:  "https://github.com/yourusername"
- name: LinkedIn
  icon: ri-linkedin-box-line
  url:  "https://www.linkedin.com/in/yourusername"
- name: Twitter
  icon: ri-twitter-x-line
  url:  "https://twitter.com/yourusername"
- name: Reddit
  icon: ri-reddit-line
  url:  "https://www.reddit.com/user/yourusername"
